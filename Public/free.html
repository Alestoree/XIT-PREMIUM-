<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlimBot Free Xit - Key Gratis</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://publisher.linkvertise.com/cdn/linkvertise.js"></script>
<style>
:root{--bg:#050a0f;--bg2:#080f17;--bg3:#0c1825;--a:#00d4ff;--a2:#0066ff;--a3:#00ff88;--d:#ff3366;--free:#00ffcc;--t:#c8e8ff;--t2:#6a9bbf;--b:#0d2a3f;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(#00ffcc04 1px,transparent 1px),linear-gradient(90deg,#00ffcc04 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.z{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;}

nav{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--b);background:#050a0fcc;backdrop-filter:blur(20px);}
.logo{font-family:'Orbitron',monospace;font-size:17px;font-weight:900;background:linear-gradient(90deg,var(--free),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;}
.back-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--free);background:transparent;color:var(--free);cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;}
.back-btn:hover{background:var(--free);color:#000;}

.main{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{width:100%;max-width:480px;background:var(--bg3);border:1px solid var(--b);border-radius:18px;padding:32px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--free),var(--a3),var(--free));}

/* HERO */
.hero-badge{display:inline-block;padding:3px 12px;border:1px solid var(--free);border-radius:20px;font-size:10px;letter-spacing:3px;color:var(--free);text-transform:uppercase;margin-bottom:12px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 transparent}50%{box-shadow:0 0 12px #00ffcc44}}
.card h1{font-family:'Orbitron',monospace;font-size:clamp(20px,4vw,28px);font-weight:900;color:#fff;margin-bottom:8px;}
.card h1 span{background:linear-gradient(90deg,var(--free),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.card .desc{font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:24px;}

/* PROGRESS */
.prog-wrap{margin-bottom:24px;}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.prog-label{font-size:12px;color:var(--t2);letter-spacing:1px;text-transform:uppercase;}
.prog-num{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:var(--free);}
.prog-bar{height:8px;background:var(--b);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--a2),var(--free));transition:width .6s ease;}

/* STEP DOTS */
.dots{display:flex;gap:6px;justify-content:center;margin-bottom:24px;flex-wrap:wrap;}
.dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--b);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t2);font-family:'Orbitron',monospace;transition:all .3s;}
.dot.done{border-color:var(--a3);background:#00ff8822;color:var(--a3);}
.dot.current{border-color:var(--free);background:#00ffcc22;color:var(--free);animation:dotpulse 1s infinite;}
@keyframes dotpulse{0%,100%{box-shadow:0 0 0 transparent}50%{box-shadow:0 0 8px #00ffcc66}}

/* STEP CARD */
.step-card{background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:20px;text-align:center;margin-bottom:18px;}
.step-icon{font-size:40px;margin-bottom:10px;}
.step-title{font-family:'Orbitron',monospace;font-size:13px;color:var(--free);margin-bottom:6px;}
.step-desc{font-size:13px;color:var(--t2);line-height:1.5;}

/* COUNTDOWN */
.countdown-wrap{text-align:center;margin-bottom:18px;}
.countdown-circle{width:100px;height:100px;border-radius:50%;border:4px solid var(--free);background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 8px;}
.countdown-num{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:var(--free);}
.countdown-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--t2);}
.countdown-msg{font-size:12px;color:var(--t2);}

/* BUTTONS */
.start-btn{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--a2),var(--free));color:#000;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-bottom:8px;}
.start-btn:hover{opacity:.85;transform:translateY(-1px);}
.start-btn:active{opacity:.7;transform:none;}
.start-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.continue-btn{width:100%;padding:13px;border-radius:10px;border:2px solid var(--a3);background:#00ff8811;color:var(--a3);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.continue-btn:hover{background:var(--a3);color:#000;}
.continue-btn:active{opacity:.7;}

/* KEY RESULT */
.result-card{text-align:center;}
.result-icon{font-size:50px;margin-bottom:12px;}
.result-title{font-family:'Orbitron',monospace;font-size:16px;color:var(--free);margin-bottom:6px;}
.result-desc{font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:16px;}
.key-box{background:var(--bg2);border:2px solid var(--free);border-radius:10px;padding:14px;margin-bottom:14px;cursor:pointer;transition:all .2s;}
.key-box:hover{background:#00ffcc0d;}
.key-text{font-family:'Orbitron',monospace;font-size:13px;color:var(--free);word-break:break-all;margin-bottom:6px;}
.key-hint{font-size:11px;color:var(--t2);}
.copy-btn{width:100%;padding:11px;border-radius:9px;border:none;background:var(--free);color:#000;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-bottom:8px;}
.copy-btn:active{opacity:.7;}
.dl-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.dl-btn{padding:10px;border-radius:9px;border:1px solid var(--free);background:transparent;color:var(--free);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.dl-btn:hover{background:var(--free);color:#000;}
.dl-btn:active{opacity:.7;}
.info-box{background:var(--bg2);border:1px solid var(--b);border-radius:9px;padding:12px;margin-top:12px;font-size:12px;color:var(--t2);line-height:1.7;}
.info-box b{color:var(--t);}

/* COOLDOWN */
.cd-card{text-align:center;}
.cd-icon{font-size:44px;margin-bottom:12px;}
.cd-title{font-family:'Orbitron',monospace;font-size:15px;color:var(--d);margin-bottom:8px;}
.cd-timer{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;color:var(--d);margin:12px 0;}
.cd-desc{font-size:13px;color:var(--t2);line-height:1.6;}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--free);color:#000;padding:7px 18px;border-radius:30px;font-weight:700;font-size:11px;transition:transform .3s;z-index:9999;}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="z">
<nav>
  <div class="logo">SlimBot Free</div>
  <a class="back-btn" href="https://alestoree.github.io/XIT-PREMIUM-/index.html">Ver Premium</a>
</nav>

<div class="main">
  <div class="card" id="mainCard">
    <!-- contenido dinamico -->
  </div>
</div>
</div>

<div id="toast">Copiado</div>

<script>
// ================================================================
// ESTADO
// ================================================================
var TOTAL_STEPS = 10;
var COUNTDOWN_SECS = 40;
var COOLDOWN_HOURS = 72;
var KEY_HOURS = 24;
var LV_ID = 6018779;

var state = {
  step: 0,       // 0 = inicio, 1-10 = pasos, 11 = resultado
  completed: 0,
  counting: false,
  timerInterval: null,
  secsLeft: COUNTDOWN_SECS,
  freeKey: null,
  expiry: null
};

function getFD(){ try{ return JSON.parse(localStorage.getItem('sb_free')||'null'); }catch(e){ return null; } }
function setFD(d){ localStorage.setItem('sb_free', JSON.stringify(d)); }
function genKey(){ var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; var s=''; for(var i=0;i<8;i++) s+=c[Math.floor(Math.random()*32)]; return 'Lic-free-'+s; }
function isKeyValid(d){ return d && d.key && new Date(d.expiry) > new Date(); }
function getCDLeft(d){
  if(!d || !d.lastIssued) return 0;
  var cd = COOLDOWN_HOURS * 3600000;
  return Math.max(0, cd - (Date.now() - d.lastIssued));
}
function fmtTime(ms){
  var h=Math.floor(ms/3600000); var m=Math.floor((ms%3600000)/60000); var s=Math.floor((ms%60000)/1000);
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
}

// ================================================================
// RENDER
// ================================================================
function render(){
  var fd = getFD();

  // Tiene key activa
  if(isKeyValid(fd)){
    state.freeKey = fd.key;
    state.expiry = fd.expiry;
    showResult();
    return;
  }

  // En cooldown
  var cdLeft = getCDLeft(fd);
  if(cdLeft > 0){
    showCooldown(cdLeft);
    return;
  }

  // Mostrar pantalla segun step
  if(state.step === 0) showIntro();
  else if(state.step >= 1 && state.step <= TOTAL_STEPS) showStep();
  else showResult();
}

// ── INTRO ──────────────────────────────────────────────────────
function showIntro(){
  var card = document.getElementById('mainCard');
  card.innerHTML =
    '<div style="text-align:center;margin-bottom:20px;">'
    +'<div class="hero-badge">Gratis · 24 horas</div>'
    +'<h1>Obtén tu<br/><span>Key Gratis</span></h1>'
    +'<p class="desc">Completa '+TOTAL_STEPS+' pasos rápidos de 40 segundos cada uno y recibe tu key de bot gratis por 24 horas.</p>'
    +'</div>'
    +'<div class="prog-wrap">'
    +'<div class="prog-top"><span class="prog-label">Progreso</span><span class="prog-num">0/'+TOTAL_STEPS+'</span></div>'
    +'<div class="prog-bar"><div class="prog-fill" style="width:0%;"></div></div>'
    +'</div>'
    +'<div class="step-card">'
    +'<div class="step-icon">🎁</div>'
    +'<div class="step-title">Key Free Xit — 24 horas</div>'
    +'<div class="step-desc">Funciones incluidas: .imagen con IA, .play MP3, .chiste, .dado, .calc, .hora, .clima, .frase, .trivia, .ping y más.</div>'
    +'</div>'
    +'<button class="start-btn" onclick="startSteps()">Empezar ahora</button>'
    +'<div class="info-box">'
    +'<b>Como funciona:</b><br/>'
    +'1. Toca Empezar<br/>'
    +'2. Se abre un anuncio en nueva pestaña<br/>'
    +'3. Espera 40 segundos en esa pestaña<br/>'
    +'4. Vuelve aqui y toca Continuar<br/>'
    +'5. Repite '+TOTAL_STEPS+' veces y obtén tu key'
    +'</div>';
}

// ── STEP ───────────────────────────────────────────────────────
function showStep(){
  var card = document.getElementById('mainCard');
  var stepNum = state.step;
  var dotsHtml = '<div class="dots">';
  for(var i=1;i<=TOTAL_STEPS;i++){
    var cls = i<stepNum?'done':i===stepNum?'current':'';
    dotsHtml += '<div class="dot '+cls+'">'+(i<stepNum?'✓':i)+'</div>';
  }
  dotsHtml += '</div>';

  var pct = ((stepNum-1)/TOTAL_STEPS*100).toFixed(0);

  card.innerHTML =
    '<div class="prog-wrap">'
    +'<div class="prog-top"><span class="prog-label">Paso '+stepNum+' de '+TOTAL_STEPS+'</span><span class="prog-num">'+(stepNum-1)+'/'+TOTAL_STEPS+'</span></div>'
    +'<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;"></div></div>'
    +'</div>'
    +dotsHtml
    +'<div class="step-card">'
    +'<div class="step-icon">⚡</div>'
    +'<div class="step-title">Paso '+stepNum+' de '+TOTAL_STEPS+'</div>'
    +'<div class="step-desc">Toca el boton de abajo para abrir el anuncio.<br/>Espera <b style="color:var(--free);">40 segundos</b> en esa pagina y luego vuelve aqui.</div>'
    +'</div>'
    +'<div class="countdown-wrap" id="cdWrap" style="display:none;">'
    +'<div class="countdown-circle"><div class="countdown-num" id="cdNum">40</div><div class="countdown-lbl">seg</div></div>'
    +'<div class="countdown-msg">Espera en la pagina del anuncio...</div>'
    +'</div>'
    +'<button class="start-btn" id="adBtn" onclick="openAd()">Abrir paso '+stepNum+'</button>'
    +'<button class="continue-btn" id="continueBtn" style="display:none;" onclick="nextStep()">Continuar al paso '+(stepNum<TOTAL_STEPS?stepNum+1:'final')+' →</button>';
}

// ── RESULT ─────────────────────────────────────────────────────
function showResult(){
  var card = document.getElementById('mainCard');
  var exp = state.expiry ? new Date(state.expiry).toLocaleString('es-MX') : '';
  card.innerHTML =
    '<div class="result-card">'
    +'<div class="result-icon">🎉</div>'
    +'<div class="result-title">Key obtenida!</div>'
    +'<div class="result-desc">Tu key free está lista. Dura <b style="color:var(--free);">24 horas</b> desde que la obtuviste.</div>'
    +'<div class="key-box" onclick="cp(\''+state.freeKey+'\')">'
    +'<div class="key-text">'+state.freeKey+'</div>'
    +'<div class="key-hint">Toca para copiar</div>'
    +'</div>'
    +'<button class="copy-btn" onclick="cp(\''+state.freeKey+'\')">Copiar key</button>'
    +'<div class="dl-row">'
    +'<button class="dl-btn" onclick="dlBot()">Bot .js</button>'
    +'<button class="dl-btn" onclick="dlTutorial()">Tutorial .txt</button>'
    +'</div>'
    +'<div class="info-box">'
    +'<b>Instrucciones:</b><br/>'
    +'1. Descarga el archivo bot<br/>'
    +'2. Instala Termux (F-Droid)<br/>'
    +'3. Corre: npm install y node slimbot-free.js<br/>'
    +'4. Escanea el QR con WhatsApp<br/>'
    +'5. Escribe: <b style="color:var(--free);">.key '+state.freeKey+'</b><br/><br/>'
    +'<b>Vence:</b> '+exp+'<br/>'
    +'<b>Para renovar:</b> Vuelve aqui despues de 72 horas'
    +'</div>'
    +'</div>';
}

// ── COOLDOWN ───────────────────────────────────────────────────
function showCooldown(ms){
  var card = document.getElementById('mainCard');
  card.innerHTML =
    '<div class="cd-card">'
    +'<div class="cd-icon">⏳</div>'
    +'<div class="cd-title">En espera</div>'
    +'<div class="cd-timer" id="cdMainTimer">'+fmtTime(ms)+'</div>'
    +'<div class="cd-desc">Ya usaste tu key gratis de hoy.<br/>Debes esperar <b style="color:var(--d);">72 horas</b> desde la ultima key para obtener otra.<br/><br/>Mientras tanto puedes comprar un plan premium.</div>'
    +'<br/><a class="back-btn" href="https://alestoree.github.io/XIT-PREMIUM-/index.html" style="display:inline-flex;margin:0 auto;">Ver planes premium</a>'
    +'</div>';
  var left = ms;
  var iv = setInterval(function(){
    left -= 1000;
    if(left <= 0){ clearInterval(iv); location.reload(); return; }
    var el = document.getElementById('cdMainTimer');
    if(el) el.textContent = fmtTime(left);
  }, 1000);
}

// ================================================================
// ACCIONES
// ================================================================
function startSteps(){
  state.step = 1;
  state.completed = 0;
  render();
}

function openAd(){
  // Abrir anuncio de Linkvertise
  linkvertise(LV_ID, {whitelist:[], blacklist:[""]});

  // Iniciar contador
  var adBtn = document.getElementById('adBtn');
  var cdWrap = document.getElementById('cdWrap');
  var continueBtn = document.getElementById('continueBtn');
  if(adBtn) adBtn.style.display = 'none';
  if(cdWrap) cdWrap.style.display = 'block';

  state.secsLeft = COUNTDOWN_SECS;
  if(state.timerInterval) clearInterval(state.timerInterval);

  state.timerInterval = setInterval(function(){
    state.secsLeft--;
    var el = document.getElementById('cdNum');
    if(el) el.textContent = state.secsLeft;
    if(state.secsLeft <= 0){
      clearInterval(state.timerInterval);
      if(continueBtn){ continueBtn.style.display = 'block'; }
      if(cdWrap){ cdWrap.innerHTML = '<div style="text-align:center;color:var(--a3);font-size:14px;font-weight:700;">Listo! Toca Continuar</div>'; }
    }
  }, 1000);
}

function nextStep(){
  if(state.timerInterval) clearInterval(state.timerInterval);
  state.completed++;
  if(state.completed >= TOTAL_STEPS){
    issueKey();
  } else {
    state.step++;
    render();
  }
}

function issueKey(){
  var key = genKey();
  var expiry = new Date(Date.now() + KEY_HOURS * 3600000).toISOString();
  setFD({ key: key, expiry: expiry, lastIssued: Date.now() });
  state.freeKey = key;
  state.expiry = expiry;
  state.step = TOTAL_STEPS + 1;
  render();
}

// ================================================================
// DESCARGAS
// ================================================================
function dlBot(){
  if(!state.freeKey){ alert('Obtén tu key primero'); return; }
  var lines = [];
  lines.push('// SlimBot Free Xit');
  lines.push('// Key: '+state.freeKey);
  lines.push('// Duracion: 24 horas');
  lines.push('// Para renovar: https://alestoree.github.io/XIT-PREMIUM-/free.html');
  lines.push('');
  lines.push("const {default:makeWASocket,useMultiFileAuthState,DisconnectReason,fetchLatestBaileysVersion}=require('@whiskeysockets/baileys');");
  lines.push("const {Boom}=require('@hapi/boom');");
  lines.push("const fs=require('fs');");
  lines.push('');
  lines.push("const MI_KEY='"+state.freeKey+"';");
  lines.push("const EXPIRY=new Date('"+state.expiry+"');");
  lines.push('function isValid(){return new Date()<EXPIRY;}');
  lines.push('function horasLeft(){return Math.max(0,Math.ceil((EXPIRY-new Date())/3600000));}');
  lines.push('const sessions={};');
  lines.push('function hasAccess(p){return sessions[p]===MI_KEY&&isValid();}');
  lines.push('const NO_KEY="Activa tu key:\\n.key '+state.freeKey+'";');
  lines.push('const EXPIRED="Tu key free vencio.\\nObtén una nueva en:\\nhttps://alestoree.github.io/XIT-PREMIUM-/free.html";');
  lines.push('var CHISTES=["Por que el libro de mates esta triste? Tiene muchos problemas.","Que le dijo el cero al ocho? Bonito cinturon.","Por que los esqueletos no pelean? No tienen agallas.","Que hace una abeja en el gym? Zum-ba.","Por que Peter Pan vuela? Porque nunca jamas.","Como se llama el campen de buceo? Bud Spencer.","Que le dice un jardinero a otro? Que buenas plantas tienes!"];');
  lines.push('var FRASES=["El exito no es definitivo ni el fracaso fatal.","Cree en ti mismo.","Haz lo que amas.","Todo parece imposible hasta que se hace.","Tu potencial es ilimitado.","Cada dia es una nueva oportunidad.","El unico limite eres tu mismo."];');
  lines.push('var TRVS=[{q:"Cuanto es 9x9?",a:"81"},{q:"Capital de Mexico?",a:"ciudad de mexico"},{q:"Lados de un hexagono?",a:"6"},{q:"Planeta mas cercano al Sol?",a:"mercurio"},{q:"Cuantos meses tiene el anio?",a:"12"}];');
  lines.push('async function startBot(){');
  lines.push('  try{');
  lines.push('    const {state:st,saveCreds}=await useMultiFileAuthState("./auth_free");');
  lines.push('    const {version}=await fetchLatestBaileysVersion();');
  lines.push('    const sock=makeWASocket({version,auth:st,printQRInTerminal:true,browser:["SlimFree","Chrome","1.0"]});');
  lines.push('    sock.ev.on("creds.update",saveCreds);');
  lines.push('    sock.ev.on("connection.update",function(u){');
  lines.push('      if(u.qr)console.log("Escanea el QR con WhatsApp!");');
  lines.push('      if(u.connection==="close"){const c=u.lastDisconnect?.error?.output?.statusCode;if(c!==DisconnectReason.loggedOut)setTimeout(startBot,3000);}');
  lines.push('      if(u.connection==="open"){console.log("SlimBot Free conectado! Key: "+MI_KEY);if(!isValid())console.log("ADVERTENCIA: Key vencida!");}');
  lines.push('    });');
  lines.push('    sock.ev.on("messages.upsert",async function({messages,type}){');
  lines.push('      if(type!=="notify")return;');
  lines.push('      for(const msg of messages){');
  lines.push('        if(!msg.message||msg.key.fromMe)continue;');
  lines.push('        const phone=msg.key.remoteJid.replace("@s.whatsapp.net","").replace("@g.us","");');
  lines.push('        const body=(msg.message?.conversation||msg.message?.extendedTextMessage?.text||"").trim();');
  lines.push('        if(!body.startsWith("."))continue;');
  lines.push('        const pts=body.split(" ");const cmd=pts[0].toLowerCase();const args=pts.slice(1).join(" ")||null;');
  lines.push('        let r=null;');
